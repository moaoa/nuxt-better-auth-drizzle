services:
  postgres:
    image: postgres:16
    platform: linux/amd64
    container_name: Postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres # <-- fixes the error
      POSTGRES_USER: postgres # optional (defaults to postgres)
      POSTGRES_DB: postgres # optional (defaults to POSTGRES_USER)
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: Jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true" # expose OTLP on :4318
    ports:
      - "4318:4318" # OTLP HTTP
      - "16686:16686" # Jaeger UI

  redis:
    image: redis:7-alpine
    container_name: Redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # One-shot DB migrations (Drizzle). Run: docker compose --profile tools run --rm migrate
  migrate:
    profiles:
      - tools
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: "no"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
    command: ["pnpm", "db:migrate"]
    depends_on:
      - postgres

volumes:
  db-data:

