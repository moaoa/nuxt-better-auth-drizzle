services:
  postgres:
    image: postgres:16
    # container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    # container_name: nuxt-app
    restart: unless-stopped
    env_file:
      - .env
    # The .env loaded by Docker should use `postgres` as the DB host for DATABASE_URL,
    # not `localhost`, to allow the app container to reach the Postgres service.
    # NOTE:
    #   Inside this container, the DB host must be the Postgres service name, not localhost.
    #   Example DATABASE_URL value for containers:
    #     postgres://user:password@postgres:5432/db
    # When using Dokploy + Traefik, exposing the port is optional because Traefik
    # reaches the container over the Docker network. Uncomment if direct host access is needed.
    # ports:
    #   - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dokploy-network

volumes:
  db-data:

networks:
  dokploy-network:
    external: true
