services:
  db:
    image: postgres:16
    # container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    # container_name: nuxt-app
    restart: unless-stopped
    env_file:
      - .env
    # When using Dokploy + Traefik, exposing the port is optional because Traefik
    # reaches the container over the Docker network. Uncomment if direct host access is needed.
    # ports:
    #   - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phonecall.rule=Host(`phonely.net`)"
      - "traefik.http.routers.phonecall.entrypoints=websecure"
      - "traefik.http.routers.phonecall.tls.certResolver=letsencrypt"
      - "traefik.http.services.phonecall.loadbalancer.server.port=3000"

volumes:
  db-data:

networks:
  dokploy-network:
    external: true
