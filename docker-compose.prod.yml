services:
  postgres:
    image: postgres:16
    # container_name: postgres
    restart: unless-stopped
    environment:
      # PostgreSQL will automatically create a database with the name specified in POSTGRES_DB
      # when the container is first initialized (on first run with empty data volume).
      # 
      # Supports both old (POSTGRES_*) and new (DB_*) variable names for backward compatibility.
      # Priority: POSTGRES_* variables take precedence, then DB_* variables, then defaults.
      # 
      # Note: DB_PASSWORD is required (new approach). POSTGRES_PASSWORD can override it (backward compatibility).
      POSTGRES_USER: ${POSTGRES_USER:-${DB_USER:-postgres}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-${DB_PASSWORD:?DB_PASSWORD is required. Set DB_PASSWORD in your .env file.}}
      POSTGRES_DB: ${POSTGRES_DB:-${DB_NAME:-postgres}}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - private-backend

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    # container_name: nuxt-app
    restart: unless-stopped
    env_file:
      - .env
    # The .env loaded by Docker should use `postgres` as the DB host for DATABASE_URL,
    # not `localhost`, to allow the app container to reach the Postgres service.
    # NOTE:
    #   Inside this container, the DB host must be the Postgres service name, not localhost.
    #   Format DATABASE_URL using environment variables:
    #     postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    #   Example with actual values:
    #     postgres://postgres:mypassword@postgres:5432/myapp_db
    # When using Dokploy + Traefik, exposing the port is optional because Traefik
    # reaches the container over the Docker network. Uncomment if direct host access is needed.
    # ports:
    #   - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs
    networks:
      - private-backend
      - dokploy-network

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    networks:
      - private-backend

  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy"]
    depends_on:
      - loki
      - app
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - app-logs:/var/log/app:ro
    networks:
      - private-backend

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN:-grafana.local}`)"
      - "traefik.http.routers.grafana.entrypoints=web,websecure"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - private-backend
      - dokploy-network

volumes:
  app-logs:
  db-data:
  loki-data:
  grafana-data:

networks:
  private-backend:
    internal: true
  dokploy-network:
    external: true
